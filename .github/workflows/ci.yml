name: CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Gate on commit message
        run: |
          MSG="${{ github.event.head_commit.message }}"
          echo "commit: $MSG"
          if echo "$MSG" | grep -q 'FAILCI'; then echo "::error::intentional failure"; exit 1; fi
          echo "CI passing"
